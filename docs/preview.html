<!doctype html>
<html lang="en" data-uniwrt-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UniWRT preview</title>
  <link rel="stylesheet" href="../htdocs/luci-static/uniwrt/cascade.css" />
</head>
<body>
  <header>
    <div class="navbar-inner">
      <a class="brand" href="#">OpenWrt</a>
      <ul id="topmenu" class="nav">
        <li class="active"><a href="#">Overview</a></li>
        <li><a href="#">Network</a></li>
        <li><a href="#">Wireless</a></li>
        <li><a href="#">System</a></li>
      </ul>
      <div id="indicators" class="pull-right"></div>
    </div>
  </header>

  <div id="maincontent">
    <h2>Overview</h2>
    <div class="alert-message warning">
      <h4>Demo notice</h4>
      <p>This local preview uses representative LuCI markup only.</p>
    </div>

    <div class="cbi-section">
      <h3>System</h3>
      <div class="cbi-value"><label class="cbi-value-title">Hostname</label><div class="cbi-value-field">OpenWrt</div></div>
      <div class="cbi-value"><label class="cbi-value-title">Load</label><div class="cbi-value-field"><div class="cbi-progressbar"><div style="width:45%"></div></div></div></div>
    </div>

    <div class="cbi-section">
      <h3>Network</h3>
      <table>
        <thead><tr><th>Interface</th><th>Protocol</th><th>Address</th><th>Status</th></tr></thead>
        <tbody>
          <tr><td><span class="ifacebadge">LAN</span></td><td>Static</td><td>192.168.1.1/24</td><td><span class="badge">Up</span></td></tr>
          <tr><td><span class="ifacebadge">WAN</span></td><td>DHCP</td><td>100.64.10.7</td><td><span class="badge">Online</span></td></tr>
        </tbody>
      </table>
    </div>
  </div>
  <script src="../htdocs/luci-static/uniwrt/js/uniwrt.js"></script>
</body>
</html>
