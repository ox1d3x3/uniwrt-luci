name: Build UniWRT router packages

env:
  PACKAGE_NAME: luci-theme-uniwrt
  TARGET: mediatek
  SUBTARGET: mt7622

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "Makefile"
      - "VERSION"
      - "CHANGELOG.md"
      - "htdocs/**"
      - "root/**"
      - "ucode/**"
      - "scripts/**"
      - ".github/workflows/build-prerelease.yml"

concurrency:
  group: uniwrt-router-prerelease-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: OpenWrt 24.10.6 mt7622 IPK
            sdk_base_url: https://downloads.openwrt.org/releases/24.10.6/targets/mediatek/mt7622/
            format: ipk
            artifact_suffix: openwrt-24.10.6-mt7622-ipk
            asset_suffix: openwrt-24.10.6-mt7622

          - label: OpenWrt 25.12.4 mt7622 APK
            sdk_base_url: https://downloads.openwrt.org/releases/25.12.4/targets/mediatek/mt7622/
            format: apk
            artifact_suffix: openwrt-25.12.4-mt7622-apk
            asset_suffix: openwrt-25.12.4-mt7622

    steps:
      - name: Checkout UniWRT source
        uses: actions/checkout@v4
        with:
          path: theme

      - name: Install host dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y             build-essential             clang             flex             bison             g++             gawk             gcc-multilib             g++-multilib             gettext             git             libncurses-dev             libssl-dev             python3             python3-setuptools             rsync             unzip             zlib1g-dev             file             wget             curl             xz-utils             zstd             libelf-dev

      - name: Prepare output directories
        run: |
          set -euo pipefail
          mkdir -p "${GITHUB_WORKSPACE}/package-artifacts" "${GITHUB_WORKSPACE}/build-logs"

      - name: Run source self-test
        working-directory: theme
        run: |
          set -euo pipefail
          chmod +x scripts/self-test.sh
          ./scripts/self-test.sh

      - name: Download OpenWrt SDK
        run: |
          set -euo pipefail
          SDK_BASE_URL="${{ matrix.sdk_base_url }}"
          LOG_FILE="${GITHUB_WORKSPACE}/build-logs/sdk-${{ matrix.artifact_suffix }}.log"

          {
            echo "UniWRT SDK download log"
            echo "Label: ${{ matrix.label }}"
            echo "SDK base URL: ${SDK_BASE_URL}"
            echo "Started: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

            SDK_FILE="$(curl -fsSL "${SDK_BASE_URL}" | grep -oE 'openwrt-sdk-[^"<>]+Linux-x86_64\.tar\.(xz|zst)' | sort -V | tail -n 1)"
            if [ -z "${SDK_FILE}" ]; then
              echo "ERROR: Could not detect OpenWrt SDK archive from ${SDK_BASE_URL}"
              exit 1
            fi

            echo "Detected SDK archive: ${SDK_FILE}"
            curl -fL --retry 5 --retry-delay 3 --retry-all-errors "${SDK_BASE_URL}${SDK_FILE}" -o "${SDK_FILE}"

            case "${SDK_FILE}" in
              *.tar.zst) tar --zstd -xf "${SDK_FILE}" ;;
              *.tar.xz)  tar -xf "${SDK_FILE}" ;;
              *) echo "ERROR: unsupported SDK archive: ${SDK_FILE}"; exit 1 ;;
            esac

            SDK_DIR="$(find . -maxdepth 1 -type d -name 'openwrt-sdk-*' | sort -V | tail -n 1)"
            if [ -z "${SDK_DIR}" ]; then
              echo "ERROR: SDK directory not found after extraction"
              exit 1
            fi

            SDK_DIR="$(cd "${SDK_DIR}" && pwd)"
            echo "SDK_DIR=${SDK_DIR}" >> "${GITHUB_ENV}"
            echo "Using SDK directory: ${SDK_DIR}"
            echo "Finished: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          } 2>&1 | tee "${LOG_FILE}"

      - name: Prepare LuCI feed dependencies
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -euo pipefail
          LOG_FILE="${GITHUB_WORKSPACE}/build-logs/feeds-${{ matrix.artifact_suffix }}.log"
          {
            echo "UniWRT feeds log"
            echo "Label: ${{ matrix.label }}"
            echo "Started: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            ./scripts/feeds update luci
            ./scripts/feeds install luci-base
            echo "Finished: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          } 2>&1 | tee "${LOG_FILE}"

      - name: Copy UniWRT package into SDK
        run: |
          set -euo pipefail
          LOG_FILE="${GITHUB_WORKSPACE}/build-logs/package-copy-${{ matrix.artifact_suffix }}.log"

          {
            echo "UniWRT package copy log"
            echo "Label: ${{ matrix.label }}"
            rm -rf "${SDK_DIR}/package/custom/${PACKAGE_NAME}"
            mkdir -p "${SDK_DIR}/package/custom/${PACKAGE_NAME}"
            rsync -a --delete \
              --exclude ".git" \
              --exclude ".github" \
              --exclude "*.zip" \
              --exclude "artifacts" \
              --exclude "package-artifacts" \
              --exclude "build-logs" \
              --exclude "dist" \
              --exclude ".sdk-*" \
              theme/ "${SDK_DIR}/package/custom/${PACKAGE_NAME}/"

            echo "Package Makefile check:"
            grep -nE 'PKG_NAME|PKG_VERSION|TITLE|BuildPackage' "${SDK_DIR}/package/custom/${PACKAGE_NAME}/Makefile"
            test -f "${SDK_DIR}/package/custom/${PACKAGE_NAME}/htdocs/luci-static/uniwrt/cascade.css"
            test -f "${SDK_DIR}/package/custom/${PACKAGE_NAME}/ucode/template/themes/uniwrt/header.ut"
          } 2>&1 | tee "${LOG_FILE}"

      - name: Build UniWRT package
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -euo pipefail
          LOG_FILE="${GITHUB_WORKSPACE}/build-logs/build-${{ matrix.artifact_suffix }}.log"

          {
            echo "UniWRT package build log"
            echo "Label: ${{ matrix.label }}"
            echo "Target: ${TARGET}/${SUBTARGET}"
            echo "Format: ${{ matrix.format }}"
            echo "Commit: ${GITHUB_SHA}"
            echo "Started: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

            echo "CONFIG_PACKAGE_${PACKAGE_NAME}=m" >> .config
            make defconfig
            grep -q "^CONFIG_PACKAGE_${PACKAGE_NAME}=m" .config || {
              echo "ERROR: ${PACKAGE_NAME} was not registered by OpenWrt defconfig"
              find package/custom/${PACKAGE_NAME} -maxdepth 3 -type f | sort
              exit 1
            }

            make "package/custom/${PACKAGE_NAME}/clean" V=s || true
            make "package/custom/${PACKAGE_NAME}/compile" V=s -j"$(nproc)"

            echo "Finished: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          } 2>&1 | tee "${LOG_FILE}"

      - name: Collect package artifacts
        run: |
          set -euo pipefail
          LOG_FILE="${GITHUB_WORKSPACE}/build-logs/artifacts-${{ matrix.artifact_suffix }}.log"

          {
            echo "UniWRT artifact collection log"
            echo "Label: ${{ matrix.label }}"

            while IFS= read -r -d '' pkg; do
              base="$(basename "${pkg}")"
              ext="${base##*.}"
              out="${GITHUB_WORKSPACE}/package-artifacts/${PACKAGE_NAME}-${{ matrix.asset_suffix }}.${ext}"
              cp -v "${pkg}" "${out}"
              if [ "${{ matrix.format }}" = "${ext}" ]; then
                cp -v "${pkg}" "${GITHUB_WORKSPACE}/package-artifacts/${PACKAGE_NAME}.${ext}"
              fi
            done < <(find "${SDK_DIR}/bin" -type f               \(                 -name "${PACKAGE_NAME}_*.ipk"                 -o -name "${PACKAGE_NAME}-*.apk"                 -o -name "${PACKAGE_NAME}_*.apk"               \) -print0)

            echo "Collected package artifacts:"
            ls -lah "${GITHUB_WORKSPACE}/package-artifacts"

            if [ "${{ matrix.format }}" = "ipk" ]; then
              test "$(find "${GITHUB_WORKSPACE}/package-artifacts" -type f -name '*.ipk' | wc -l)" -gt 0
            fi

            if [ "${{ matrix.format }}" = "apk" ]; then
              test "$(find "${GITHUB_WORKSPACE}/package-artifacts" -type f -name '*.apk' | wc -l)" -gt 0
            fi
          } 2>&1 | tee "${LOG_FILE}"

      - name: Write build summary
        if: always()
        run: |
          set -euo pipefail
          SUMMARY_FILE="${GITHUB_WORKSPACE}/build-logs/summary-${{ matrix.artifact_suffix }}.md"
          {
            echo "# UniWRT build summary"
            echo
            echo "- Label: ${{ matrix.label }}"
            echo "- Target: ${TARGET}/${SUBTARGET}"
            echo "- Package format: ${{ matrix.format }}"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Workflow run: ${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
            echo "- Finished: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo
            echo "## Package files"
            find "${GITHUB_WORKSPACE}/package-artifacts" -maxdepth 1 -type f -printf '- %f\n' 2>/dev/null || true
            echo
            echo "## Log files"
            find "${GITHUB_WORKSPACE}/build-logs" -maxdepth 1 -type f -printf '- %f\n' | sort
          } > "${SUMMARY_FILE}"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: uniwrt-packages-${{ matrix.artifact_suffix }}
          path: package-artifacts/*
          if-no-files-found: error

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uniwrt-logs-${{ matrix.artifact_suffix }}
          path: build-logs/*
          if-no-files-found: warn

  prerelease:
    name: Publish GitHub pre-release
    runs-on: ubuntu-24.04
    needs: build
    if: ${{ success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch') }}

    steps:
      - name: Checkout UniWRT source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download package and log artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate release notes and checksums
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(tr -d '[:space:]' < VERSION)"
          VERSION="${VERSION#v}"
          mkdir -p release-assets release-upload

          find release-assets -type f             \( -name '*.ipk' -o -name '*.apk' -o -name '*.log' -o -name 'summary-*.md' \)             -exec cp -f {} release-upload/ \;

          (
            cd release-upload
            find . -maxdepth 1 -type f ! -name 'SHA256SUMS.txt' -printf '%f\0'               | sort -z               | xargs -0 -r sha256sum
          ) > release-upload/SHA256SUMS.txt

          PACKAGE_LIST="$(find release-upload -maxdepth 1 -type f \( -name '*.ipk' -o -name '*.apk' \) -printf '- `%f`\n' | sort || true)"
          if [ -z "${PACKAGE_LIST}" ]; then
            echo "ERROR: no APK/IPK files found in release-upload"
            find release-upload -maxdepth 1 -type f -print
            exit 1
          fi

          LOG_LIST="$(find release-upload -maxdepth 1 -type f \( -name '*.log' -o -name 'summary-*.md' \) -printf '- `%f`\n' | sort || true)"
          if [ -z "${LOG_LIST}" ]; then
            LOG_LIST="- No log files were collected."
          fi

          RECENT_COMMITS="$(git log --pretty=format:'- `%h` %s' --no-merges -n 20 || true)"
          if [ -z "${RECENT_COMMITS}" ]; then
            RECENT_COMMITS="- No commit summary available."
          fi

          cat > PRE_RELEASE_NOTES.md <<EOF
          # UniWRT v${VERSION} pre-release

          Automated router package build for mediatek/mt7622.

          ## Built packages

          ${PACKAGE_LIST}

          ## Build logs included

          ${LOG_LIST}

          ## Recent commits

          ${RECENT_COMMITS}

          ## Install on OpenWrt 25.12.4

          ```sh
          cd /tmp
          apk del luci-theme-uniwrt 2>/dev/null || true
          sed -i '/^luci-theme-uniwrt/d' /etc/apk/world 2>/dev/null || true
          wget https://github.com/${GITHUB_REPOSITORY}/releases/download/pre-release/luci-theme-uniwrt.apk
          apk add --allow-untrusted ./luci-theme-uniwrt.apk
          uci set luci.main.mediaurlbase='/luci-static/uniwrt'
          uci commit luci
          rm -rf /tmp/luci-indexcache /tmp/luci-modulecache
          /etc/init.d/uhttpd restart
          ```

          ## Install on OpenWrt 24.10.6

          ```sh
          cd /tmp
          wget https://github.com/${GITHUB_REPOSITORY}/releases/download/pre-release/luci-theme-uniwrt.ipk
          opkg install ./luci-theme-uniwrt.ipk
          uci set luci.main.mediaurlbase='/luci-static/uniwrt'
          uci commit luci
          rm -rf /tmp/luci-indexcache /tmp/luci-modulecache
          /etc/init.d/uhttpd restart
          ```
          EOF

          cp PRE_RELEASE_NOTES.md release-upload/RELEASE_NOTES.txt

      - name: Replace moving pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if gh release view pre-release >/dev/null 2>&1; then
            gh release delete pre-release --yes --cleanup-tag
          else
            echo 'No previous pre-release found.'
            git push origin :refs/tags/pre-release 2>/dev/null || true
          fi

          git tag -f pre-release "$GITHUB_SHA"
          git push origin -f refs/tags/pre-release

          mapfile -t assets < <(find release-upload -maxdepth 1 -type f | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo 'ERROR: No release asset files were prepared.' >&2
            exit 1
          fi

          gh release create pre-release "${assets[@]}" \
            --title "UniWRT router pre-release #${GITHUB_RUN_NUMBER}" \
            --notes-file PRE_RELEASE_NOTES.md \
            --prerelease
