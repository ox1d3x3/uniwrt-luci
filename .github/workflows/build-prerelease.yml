name: Build CleanX pre-release packages

env:
  PACKAGE_NAME: luci-theme-cleanx
  TARGET: mediatek
  SUBTARGET: mt7622

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "Makefile"
      - "VERSION"
      - "CHANGELOG.md"
      - "htdocs/**"
      - "root/**"
      - "ucode/**"
      - "scripts/**"
      - ".github/workflows/build-prerelease.yml"

concurrency:
  group: cleanx-prerelease-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: OpenWrt 24.10.6 IPK
            sdk_base_url: https://downloads.openwrt.org/releases/24.10.6/targets/mediatek/mt7622/
            format: ipk
            artifact_suffix: openwrt-24.10.6-mt7622-ipk
            asset_suffix: all-openwrt-24.10.6

          - label: OpenWrt 25.12.4 APK
            sdk_base_url: https://downloads.openwrt.org/releases/25.12.4/targets/mediatek/mt7622/
            format: apk
            artifact_suffix: openwrt-25.12.4-mt7622-apk
            asset_suffix: all-openwrt-25.12.4

          - label: OpenWrt Snapshot APK
            sdk_base_url: https://downloads.openwrt.org/snapshots/targets/mediatek/mt7622/
            format: apk
            artifact_suffix: openwrt-snapshot-mt7622-apk
            asset_suffix: all-openwrt-snapshot

    steps:
      - name: Checkout CleanX source
        uses: actions/checkout@v5
        with:
          path: theme

      - name: Install host dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            g++-multilib \
            gettext \
            git \
            libncurses-dev \
            libssl-dev \
            python3 \
            python3-setuptools \
            rsync \
            unzip \
            zlib1g-dev \
            file \
            wget \
            curl \
            xz-utils \
            zstd \
            libelf-dev

      - name: Prepare output directories
        run: |
          set -euo pipefail
          mkdir -p "${GITHUB_WORKSPACE}/package-artifacts" "${GITHUB_WORKSPACE}/build-logs"

      - name: Download OpenWrt SDK
        run: |
          set -euo pipefail
          SDK_BASE_URL="${{ matrix.sdk_base_url }}"
          LOG_FILE="${GITHUB_WORKSPACE}/build-logs/sdk-${{ matrix.artifact_suffix }}.log"

          {
            echo "CleanX SDK download log"
            echo "Label: ${{ matrix.label }}"
            echo "SDK base URL: ${SDK_BASE_URL}"
            echo "Started: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

            SDK_FILE="$(curl -fsSL "${SDK_BASE_URL}" | grep -oE 'openwrt-sdk-[^"<>]+Linux-x86_64\.tar\.(xz|zst)' | head -n 1)"
            if [ -z "${SDK_FILE}" ]; then
              echo "ERROR: Could not detect OpenWrt SDK archive from ${SDK_BASE_URL}"
              exit 1
            fi

            echo "Detected SDK archive: ${SDK_FILE}"
            curl -fL "${SDK_BASE_URL}${SDK_FILE}" -o "${SDK_FILE}"

            case "${SDK_FILE}" in
              *.tar.zst) tar --zstd -xf "${SDK_FILE}" ;;
              *.tar.xz)  tar -xf "${SDK_FILE}" ;;
              *) echo "ERROR: unsupported SDK archive: ${SDK_FILE}"; exit 1 ;;
            esac

            SDK_DIR="$(find . -maxdepth 1 -type d -name 'openwrt-sdk-*' | head -n 1)"
            if [ -z "${SDK_DIR}" ]; then
              echo "ERROR: SDK directory not found after extraction"
              exit 1
            fi

            echo "SDK_DIR=${SDK_DIR}" >> "${GITHUB_ENV}"
            echo "Using SDK directory: ${SDK_DIR}"
            echo "Finished: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          } 2>&1 | tee "${LOG_FILE}"

      - name: Prepare OpenWrt feeds
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -euo pipefail
          LOG_FILE="${GITHUB_WORKSPACE}/build-logs/feeds-${{ matrix.artifact_suffix }}.log"
          {
            echo "CleanX feeds log"
            echo "Label: ${{ matrix.label }}"
            echo "Started: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            ./scripts/feeds update -a
            ./scripts/feeds install -a
            echo "Finished: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          } 2>&1 | tee "${LOG_FILE}"

      - name: Copy CleanX package into SDK
        run: |
          set -euo pipefail
          LOG_FILE="${GITHUB_WORKSPACE}/build-logs/package-copy-${{ matrix.artifact_suffix }}.log"

          {
            echo "CleanX package copy log"
            echo "Label: ${{ matrix.label }}"
            rm -rf "${SDK_DIR}/package/custom/${PACKAGE_NAME}"
            mkdir -p "${SDK_DIR}/package/custom/${PACKAGE_NAME}"
            rsync -a --delete \
              --exclude ".git" \
              --exclude ".github" \
              --exclude "*.zip" \
              --exclude "artifacts" \
              --exclude "package-artifacts" \
              --exclude "build-logs" \
              theme/ "${SDK_DIR}/package/custom/${PACKAGE_NAME}/"

            echo "Makefile package name check:"
            grep -nE 'PKG_NAME|PKG_VERSION|LUCI_TITLE' "${SDK_DIR}/package/custom/${PACKAGE_NAME}/Makefile"
          } 2>&1 | tee "${LOG_FILE}"

      - name: Build CleanX package
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -euo pipefail
          LOG_FILE="${GITHUB_WORKSPACE}/build-logs/build-${{ matrix.artifact_suffix }}.log"

          {
            echo "CleanX package build log"
            echo "Label: ${{ matrix.label }}"
            echo "Target: ${TARGET}/${SUBTARGET}"
            echo "Format: ${{ matrix.format }}"
            echo "Commit: ${GITHUB_SHA}"
            echo "Started: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            make defconfig
            make "package/${PACKAGE_NAME}/clean" V=s || true
            make "package/${PACKAGE_NAME}/compile" V=s -j"$(nproc)"
            echo "Finished: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          } 2>&1 | tee "${LOG_FILE}"

      - name: Collect package artifacts
        run: |
          set -euo pipefail
          LOG_FILE="${GITHUB_WORKSPACE}/build-logs/artifacts-${{ matrix.artifact_suffix }}.log"

          {
            echo "CleanX artifact collection log"
            echo "Label: ${{ matrix.label }}"

            while IFS= read -r -d '' pkg; do
              base="$(basename "${pkg}")"
              ext="${base##*.}"
              stem="${base%.*}"
              out="${GITHUB_WORKSPACE}/package-artifacts/${stem}-${{ matrix.asset_suffix }}.${ext}"
              cp -v "${pkg}" "${out}"
            done < <(find "${SDK_DIR}/bin" -type f \
              \( \
                -name "${PACKAGE_NAME}_*.ipk" \
                -o -name "${PACKAGE_NAME}-*.apk" \
                -o -name "${PACKAGE_NAME}_*.apk" \
              \) -print0)

            echo "Collected package artifacts:"
            ls -lah "${GITHUB_WORKSPACE}/package-artifacts"

            if [ "${{ matrix.format }}" = "ipk" ]; then
              test "$(find "${GITHUB_WORKSPACE}/package-artifacts" -type f -name '*.ipk' | wc -l)" -gt 0
            fi

            if [ "${{ matrix.format }}" = "apk" ]; then
              test "$(find "${GITHUB_WORKSPACE}/package-artifacts" -type f -name '*.apk' | wc -l)" -gt 0
            fi
          } 2>&1 | tee "${LOG_FILE}"

      - name: Write build summary
        if: always()
        run: |
          set -euo pipefail
          SUMMARY_FILE="${GITHUB_WORKSPACE}/build-logs/summary-${{ matrix.artifact_suffix }}.md"
          {
            echo "# CleanX build summary"
            echo
            echo "- Label: ${{ matrix.label }}"
            echo "- Target: ${TARGET}/${SUBTARGET}"
            echo "- Package format: ${{ matrix.format }}"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Workflow run: ${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
            echo "- Finished: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo
            echo "## Package files"
            find "${GITHUB_WORKSPACE}/package-artifacts" -maxdepth 1 -type f -printf '- %f\n' 2>/dev/null || true
            echo
            echo "## Log files"
            find "${GITHUB_WORKSPACE}/build-logs" -maxdepth 1 -type f -printf '- %f\n' | sort
          } > "${SUMMARY_FILE}"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cleanx-packages-${{ matrix.artifact_suffix }}
          path: package-artifacts/*
          if-no-files-found: error

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cleanx-logs-${{ matrix.artifact_suffix }}
          path: build-logs/*
          if-no-files-found: warn

  prerelease:
    name: Publish GitHub pre-release
    runs-on: ubuntu-24.04
    needs: build
    if: ${{ success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch') }}

    steps:
      - name: Checkout CleanX source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download package and log artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate release notes and checksums
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(tr -d '[:space:]' < VERSION)"
          VERSION="${VERSION#v}"
          TAG="v${VERSION}-pre.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          TITLE="CleanX v${VERSION} pre-release #${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"

          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "title=${TITLE}" >> "${GITHUB_OUTPUT}"

          mkdir -p release-assets

          (
            cd release-assets
            find . -maxdepth 1 -type f ! -name 'SHA256SUMS.txt' -printf '%f\0' \
              | sort -z \
              | xargs -0 -r sha256sum
          ) > release-assets/SHA256SUMS.txt

          CHANGELOG_SECTION=""
          if [ -f CHANGELOG.md ]; then
            CHANGELOG_SECTION="$(awk -v ver="${VERSION}" '
              $0 ~ "^## \\[?v?" ver "\\]?" { capture=1; next }
              capture && $0 ~ "^## " { exit }
              capture { print }
            ' CHANGELOG.md | sed '/^[[:space:]]*$/d' || true)"
          fi

          if [ -z "${CHANGELOG_SECTION}" ]; then
            CHANGELOG_SECTION="- Automated CleanX SDK build for testing."
          fi

          LAST_STABLE_TAG="$(git tag --list 'v[0-9]*' --sort=-v:refname | grep -v -- '-pre\.' | head -n 1 || true)"
          if [ -n "${LAST_STABLE_TAG}" ]; then
            COMMIT_RANGE="${LAST_STABLE_TAG}..HEAD"
          else
            COMMIT_RANGE="HEAD"
          fi

          RECENT_COMMITS="$(git log ${COMMIT_RANGE} --pretty=format:'- `%h` %s' --no-merges -n 30 || true)"
          if [ -z "${RECENT_COMMITS}" ]; then
            RECENT_COMMITS="- No extra commit summary available."
          fi

          PACKAGE_LIST="$(find release-assets -maxdepth 1 -type f \( -name '*.ipk' -o -name '*.apk' \) -printf '- `%f`\n' | sort || true)"
          if [ -z "${PACKAGE_LIST}" ]; then
            echo "ERROR: no APK/IPK files found in release-assets"
            find release-assets -maxdepth 1 -type f -print
            exit 1
          fi

          LOG_LIST="$(find release-assets -maxdepth 1 -type f \( -name '*.log' -o -name 'summary-*.md' \) -printf '- `%f`\n' | sort || true)"
          if [ -z "${LOG_LIST}" ]; then
            LOG_LIST="- No log files were collected."
          fi

          cat > release-notes.md <<EOF
          # CleanX v${VERSION} pre-release

          This is an automated **pre-release** generated by GitHub Actions after the OpenWrt SDK builds completed successfully.

          ## Changes, fixes and features

          ${CHANGELOG_SECTION}

          ## Built packages

          ${PACKAGE_LIST}

          Architecture note: CleanX is a LuCI theme package with no compiled binaries. The built files are marked `all` and are intended to be architecture-independent across OpenWrt targets; use the package format that matches your OpenWrt version.

          ## Build logs included

          ${LOG_LIST}

          ## Recent commits

          ${RECENT_COMMITS}

          ## Testing notes

          Use the OpenWrt package format that matches your router firmware:

          - OpenWrt 24.10.x and older: use the file ending in `.ipk`.
          - OpenWrt 25.12+ and release builds: use the release `.apk`.
          - OpenWrt snapshot: use the snapshot `.apk` only on a matching snapshot build.

          After installing, clear LuCI cache and hard refresh the browser:

          ```sh
          rm -rf /tmp/luci-indexcache /tmp/luci-modulecache
          /etc/init.d/uhttpd restart
          ```

          If testing passes, create a stable release manually from GitHub using the tested package assets.
          EOF

          cp release-notes.md release-assets/RELEASE_NOTES.txt

      - name: Create GitHub pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${{ steps.release_meta.outputs.tag }}" \
            release-assets/* \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "${{ steps.release_meta.outputs.title }}" \
            --notes-file release-notes.md \
            --prerelease
