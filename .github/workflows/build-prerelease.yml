name: Build UniWRT packages

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: uniwrt-prerelease-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.package_type }} on OpenWrt ${{ matrix.openwrt_version }} ${{ matrix.target }}/${{ matrix.subtarget }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - openwrt_version: '24.10.6'
            package_type: ipk
            target: x86
            subtarget: '64'
          - openwrt_version: '25.12.4'
            package_type: apk
            target: mediatek
            subtarget: mt7622

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils build-essential clang flex bison g++ gawk gcc-multilib gettext git \
            libncurses-dev libssl-dev python3 python3-setuptools rsync unzip \
            zlib1g-dev file wget curl tar xz-utils zstd

      - name: Run project self-test
        run: |
          chmod +x scripts/self-test.sh
          ./scripts/self-test.sh

      - name: Build package with OpenWrt SDK
        env:
          OPENWRT_VERSION: ${{ matrix.openwrt_version }}
          TARGET: ${{ matrix.target }}
          SUBTARGET: ${{ matrix.subtarget }}
          WORK_DIR: ${{ runner.temp }}/uniwrt-sdk-${{ matrix.openwrt_version }}-${{ matrix.target }}-${{ matrix.subtarget }}
        run: |
          chmod +x scripts/build-sdk.sh
          ./scripts/build-sdk.sh

      - name: Prepare workflow artifacts
        if: always()
        run: |
          set -euo pipefail
          mkdir -p upload
          cp -f dist/*.log upload/ 2>/dev/null || true
          cp -f dist/*.ipk upload/ 2>/dev/null || true
          cp -f dist/*.apk upload/ 2>/dev/null || true
          if [ "${{ matrix.package_type }}" = "ipk" ] && [ -f dist/luci-theme-uniwrt.ipk ]; then
            cp -f dist/luci-theme-uniwrt.ipk upload/luci-theme-uniwrt.ipk
            cp -f dist/luci-theme-uniwrt_all.ipk upload/luci-theme-uniwrt_all.ipk
          fi
          if [ "${{ matrix.package_type }}" = "apk" ] && [ -f dist/luci-theme-uniwrt.apk ]; then
            cp -f dist/luci-theme-uniwrt.apk upload/luci-theme-uniwrt.apk
            cp -f dist/luci-theme-uniwrt_all.apk upload/luci-theme-uniwrt_all.apk
            cp -f dist/luci-theme-uniwrt.apk upload/luci-theme-uniwrt-${{ matrix.openwrt_version }}-${{ matrix.target }}-${{ matrix.subtarget }}.apk
          fi
          find upload -maxdepth 1 -type f -printf '- %f\n' | sort || true

      - name: Upload workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uniwrt-${{ matrix.package_type }}-openwrt-${{ matrix.openwrt_version }}-${{ matrix.target }}-${{ matrix.subtarget }}
          path: upload/*
          if-no-files-found: ignore

  prerelease:
    name: Publish moving pre-release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate pre-release notes
        run: |
          short_sha="${GITHUB_SHA::7}"
          version="$(cat VERSION 2>/dev/null || echo 0.1.7)"
          cat > PRE_RELEASE_NOTES.md <<EOF_NOTES
          # UniWRT Theme pre-release

          **Build:** ${GITHUB_RUN_NUMBER}  
          **Commit:** ${short_sha}  
          **Theme version:** ${version}

          ## Changes / fixes / features in this build
          $(git log -n 15 --pretty=format:'- %s (%h)' || true)

          ## Artifacts
          - `luci-theme-uniwrt.ipk` for OpenWrt 24.x / opkg systems
          - `luci-theme-uniwrt.apk` for OpenWrt 25.x / apk systems
          - `_all` aliases are included for universal package naming
          - Build logs are attached for troubleshooting

          ## Install
          OpenWrt 24.x:
          ```sh
          cd /tmp
          wget https://github.com/${GITHUB_REPOSITORY}/releases/download/pre-release/luci-theme-uniwrt.ipk
          opkg install luci-theme-uniwrt.ipk
          uci set luci.main.mediaurlbase='/luci-static/uniwrt'
          uci commit luci
          /etc/init.d/uhttpd restart
          ```

          OpenWrt 25.x:
          ```sh
          cd /tmp
          wget https://github.com/${GITHUB_REPOSITORY}/releases/download/pre-release/luci-theme-uniwrt.apk
          apk del luci-theme-uniwrt 2>/dev/null || true
          sed -i '/^luci-theme-uniwrt/d' /etc/apk/world 2>/dev/null || true
          apk add --allow-untrusted ./luci-theme-uniwrt.apk
          uci set luci.main.mediaurlbase='/luci-static/uniwrt'
          uci commit luci
          /etc/init.d/uhttpd restart
          ```
          EOF_NOTES

      - name: Prepare release assets
        run: |
          set -euo pipefail
          rm -rf release-upload
          mkdir -p release-upload

          find release-assets -type f \
            \( -name '*.ipk' -o -name '*.apk' -o -name '*.log' \) \
            -exec cp -f {} release-upload/ \;

          echo 'Release assets prepared:'
          find release-upload -maxdepth 1 -type f -printf '- %f\n' | sort

          test -f release-upload/luci-theme-uniwrt.ipk
          test -f release-upload/luci-theme-uniwrt.apk
          test -f release-upload/luci-theme-uniwrt_all.ipk
          test -f release-upload/luci-theme-uniwrt_all.apk

      - name: Replace moving pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if gh release view pre-release >/dev/null 2>&1; then
            gh release delete pre-release --yes --cleanup-tag
          else
            echo 'No previous pre-release found.'
            git push origin :refs/tags/pre-release 2>/dev/null || true
          fi

          git tag -f pre-release "$GITHUB_SHA"
          git push origin -f refs/tags/pre-release

          mapfile -t assets < <(find release-upload -maxdepth 1 -type f | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo 'ERROR: No release asset files were prepared.' >&2
            exit 1
          fi

          gh release create pre-release "${assets[@]}" \
            --title "UniWRT pre-release #${GITHUB_RUN_NUMBER}" \
            --notes-file PRE_RELEASE_NOTES.md \
            --prerelease
