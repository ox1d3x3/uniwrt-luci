name: Build UniWRT packages

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: uniwrt-prerelease-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  package:
    name: Build universal IPK/APK
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build universal packages
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            alpine:3.20 \
            sh -euxc 'apk add --no-cache bash binutils coreutils gzip tar python3 nodejs abuild && chmod +x scripts/self-test.sh scripts/package.sh && ./scripts/self-test.sh && ./scripts/package.sh'
          sudo chown -R "$(id -u):$(id -g)" dist build

      - name: Prepare workflow artifacts
        if: always()
        run: |
          set -euo pipefail
          mkdir -p upload
          cp -f dist/*.log upload/ 2>/dev/null || true
          cp -f dist/*.ipk upload/ 2>/dev/null || true
          cp -f dist/*.apk upload/ 2>/dev/null || true
          find upload -maxdepth 1 -type f -printf '- %f\n' | sort || true

      - name: Upload workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uniwrt-universal-packages
          path: upload/*
          if-no-files-found: error

  prerelease:
    name: Publish moving pre-release
    needs: package
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate pre-release notes
        run: |
          short_sha="${GITHUB_SHA::7}"
          version="$(cat VERSION 2>/dev/null || echo 0.1.9)"
          cat > PRE_RELEASE_NOTES.md <<EOF_NOTES
          # UniWRT Theme pre-release

          **Build:** ${GITHUB_RUN_NUMBER}  
          **Commit:** ${short_sha}  
          **Theme version:** ${version}

          ## Artifacts
          - `luci-theme-uniwrt.ipk` for OpenWrt 24.x / opkg systems
          - `luci-theme-uniwrt.apk` for OpenWrt 25.x / apk systems
          - `_all` aliases are included for universal package naming
          - Build log is attached for troubleshooting

          ## Install
          OpenWrt 24.x:
          ```sh
          cd /tmp
          wget https://github.com/${GITHUB_REPOSITORY}/releases/download/pre-release/luci-theme-uniwrt.ipk
          opkg install ./luci-theme-uniwrt.ipk
          uci set luci.main.mediaurlbase='/luci-static/uniwrt'
          uci commit luci
          /etc/init.d/uhttpd restart
          ```

          OpenWrt 25.x:
          ```sh
          cd /tmp
          wget https://github.com/${GITHUB_REPOSITORY}/releases/download/pre-release/luci-theme-uniwrt.apk
          apk del luci-theme-uniwrt 2>/dev/null || true
          sed -i '/^luci-theme-uniwrt/d' /etc/apk/world 2>/dev/null || true
          apk add --allow-untrusted ./luci-theme-uniwrt.apk
          uci set luci.main.mediaurlbase='/luci-static/uniwrt'
          uci commit luci
          /etc/init.d/uhttpd restart
          ```
          EOF_NOTES

      - name: Prepare release assets
        run: |
          set -euo pipefail
          rm -rf release-upload
          mkdir -p release-upload

          find release-assets -type f \
            \( -name '*.ipk' -o -name '*.apk' -o -name '*.log' \) \
            -exec cp -f {} release-upload/ \;

          echo 'Release assets prepared:'
          find release-upload -maxdepth 1 -type f -printf '- %f\n' | sort

          test -f release-upload/luci-theme-uniwrt.ipk
          test -f release-upload/luci-theme-uniwrt.apk
          test -f release-upload/luci-theme-uniwrt_all.ipk
          test -f release-upload/luci-theme-uniwrt_all.apk

      - name: Replace moving pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if gh release view pre-release >/dev/null 2>&1; then
            gh release delete pre-release --yes --cleanup-tag
          else
            echo 'No previous pre-release found.'
            git push origin :refs/tags/pre-release 2>/dev/null || true
          fi

          git tag -f pre-release "$GITHUB_SHA"
          git push origin -f refs/tags/pre-release

          mapfile -t assets < <(find release-upload -maxdepth 1 -type f | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo 'ERROR: No release asset files were prepared.' >&2
            exit 1
          fi

          gh release create pre-release "${assets[@]}" \
            --title "UniWRT pre-release #${GITHUB_RUN_NUMBER}" \
            --notes-file PRE_RELEASE_NOTES.md \
            --prerelease
