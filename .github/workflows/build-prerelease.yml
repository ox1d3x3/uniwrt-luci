name: Build UniWRT packages

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Theme version override for release notes only'
        required: false
        default: ''

concurrency:
  group: uniwrt-prerelease-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.package_type }} on OpenWrt ${{ matrix.openwrt_version }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - openwrt_version: '24.10.2'
            package_type: ipk
            target: x86
            subtarget: '64'
          - openwrt_version: '25.12.4'
            package_type: apk
            target: x86
            subtarget: '64'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib gettext git \
            libncurses-dev libssl-dev python3 python3-setuptools rsync unzip \
            zlib1g-dev file wget curl tar xz-utils zstd

      - name: Build package with OpenWrt SDK
        env:
          OPENWRT_VERSION: ${{ matrix.openwrt_version }}
          TARGET: ${{ matrix.target }}
          SUBTARGET: ${{ matrix.subtarget }}
          WORK_DIR: ${{ runner.temp }}/uniwrt-sdk-${{ matrix.openwrt_version }}
        run: |
          chmod +x scripts/build-sdk.sh
          ./scripts/build-sdk.sh

      - name: Normalise artifact names
        run: |
          mkdir -p upload
          cp -f dist/build-${{ matrix.openwrt_version }}.log upload/build-${{ matrix.openwrt_version }}-${{ matrix.package_type }}.log
          if [ "${{ matrix.package_type }}" = "ipk" ]; then
            cp -f dist/luci-theme-uniwrt.ipk upload/luci-theme-uniwrt.ipk
          else
            cp -f dist/luci-theme-uniwrt.apk upload/luci-theme-uniwrt.apk
          fi

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: uniwrt-${{ matrix.package_type }}-openwrt-${{ matrix.openwrt_version }}
          path: upload/*

  prerelease:
    name: Publish moving pre-release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate pre-release notes
        run: |
          short_sha="${GITHUB_SHA::7}"
          version="$(cat VERSION 2>/dev/null || echo 0.1.1)"
          cat > PRE_RELEASE_NOTES.md <<EOF
          # UniWRT Theme pre-release

          **Build:** ${GITHUB_RUN_NUMBER}  
          **Commit:** ${short_sha}  
          **Theme version:** ${version}

          ## Changes / fixes / features in this build
          $(git log -n 15 --pretty=format:'- %s (%h)' || true)

          ## Artifacts
          - `luci-theme-uniwrt.ipk` for OpenWrt 24.10.x / opkg systems
          - `luci-theme-uniwrt.apk` for OpenWrt 25.12.x / apk systems
          - Build logs are attached for troubleshooting

          ## Install
          OpenWrt 24.x:
          ```sh
          cd /tmp
          wget https://github.com/${GITHUB_REPOSITORY}/releases/download/pre-release/luci-theme-uniwrt.ipk
          opkg install luci-theme-uniwrt.ipk
          uci set luci.main.mediaurlbase='/luci-static/uniwrt'
          uci commit luci
          /etc/init.d/uhttpd restart
          ```

          OpenWrt 25.x:
          ```sh
          cd /tmp
          wget https://github.com/${GITHUB_REPOSITORY}/releases/download/pre-release/luci-theme-uniwrt.apk
          apk add --allow-untrusted luci-theme-uniwrt.apk
          uci set luci.main.mediaurlbase='/luci-static/uniwrt'
          uci commit luci
          /etc/init.d/uhttpd restart
          ```
          EOF

      - name: Replace moving pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release delete pre-release --yes --cleanup-tag || true
          git tag -f pre-release "$GITHUB_SHA"
          git push origin -f pre-release
          gh release create pre-release release-assets/* \
            --title "UniWRT pre-release #${GITHUB_RUN_NUMBER}" \
            --notes-file PRE_RELEASE_NOTES.md \
            --prerelease
