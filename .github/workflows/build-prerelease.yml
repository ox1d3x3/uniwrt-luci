name: Build UniWRT pre-release packages

env:
  PACKAGE_NAME: luci-theme-uniwrt
  TARGET: mediatek
  SUBTARGET: mt7622

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "Makefile"
      - "VERSION"
      - "CHANGELOG.md"
      - "htdocs/**"
      - "root/**"
      - "ucode/**"
      - "scripts/**"
      - ".github/workflows/build-prerelease.yml"

concurrency:
  group: uniwrt-prerelease-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: OpenWrt 24.10.6 IPK
            sdk_base_url: https://downloads.openwrt.org/releases/24.10.6/targets/mediatek/mt7622/
            format: ipk
            artifact_suffix: openwrt-24.10.6-mt7622-ipk

          - label: OpenWrt 25.12.4 APK
            sdk_base_url: https://downloads.openwrt.org/releases/25.12.4/targets/mediatek/mt7622/
            format: apk
            artifact_suffix: openwrt-25.12.4-mt7622-apk

    steps:
      - name: Checkout UniWRT source
        uses: actions/checkout@v4
        with:
          path: theme

      - name: Install host dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            g++-multilib \
            gettext \
            git \
            libncurses-dev \
            libssl-dev \
            python3 \
            python3-setuptools \
            rsync \
            unzip \
            zlib1g-dev \
            file \
            wget \
            curl \
            xz-utils \
            zstd \
            libelf-dev

      - name: Prepare output directories
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${GITHUB_WORKSPACE}/package-artifacts" "${GITHUB_WORKSPACE}/build-logs"

      - name: Run source self-test
        working-directory: theme
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/self-test.sh
          ./scripts/self-test.sh

      - name: Download OpenWrt SDK
        shell: bash
        working-directory: ${{ runner.temp }}
        run: |
          set -euo pipefail
          SDK_BASE_URL="${{ matrix.sdk_base_url }}"
          LOG_FILE="${GITHUB_WORKSPACE}/build-logs/sdk-${{ matrix.artifact_suffix }}.log"

          {
            echo "UniWRT SDK download log"
            echo "Label: ${{ matrix.label }}"
            echo "SDK base URL: ${SDK_BASE_URL}"
            echo "Started: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

            SDK_FILE="$(curl -fsSL "${SDK_BASE_URL}" | grep -oE 'openwrt-sdk-[^"<>]+Linux-x86_64\.tar\.(xz|zst)' | sort -V | tail -n 1 || true)"
            if [ -z "${SDK_FILE}" ]; then
              echo "ERROR: Could not detect OpenWrt SDK archive from ${SDK_BASE_URL}"
              exit 1
            fi

            echo "Detected SDK archive: ${SDK_FILE}"
            curl -fL --retry 5 --retry-delay 3 --retry-all-errors "${SDK_BASE_URL}${SDK_FILE}" -o "${SDK_FILE}"

            case "${SDK_FILE}" in
              *.tar.zst) tar --zstd -xf "${SDK_FILE}" ;;
              *.tar.xz)  tar -xf "${SDK_FILE}" ;;
              *) echo "ERROR: Unsupported SDK archive: ${SDK_FILE}"; exit 1 ;;
            esac

            SDK_DIR="$(find "${{ runner.temp }}" -maxdepth 1 -type d -name 'openwrt-sdk-*' | sort -V | tail -n 1)"
            if [ -z "${SDK_DIR}" ]; then
              echo "ERROR: SDK directory not found after extraction"
              exit 1
            fi

            SDK_DIR="$(cd "${SDK_DIR}" && pwd)"
            echo "SDK_DIR=${SDK_DIR}" >> "${GITHUB_ENV}"
            echo "Using SDK directory: ${SDK_DIR}"
            echo "Finished: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          } 2>&1 | tee "${LOG_FILE}"

      - name: Copy UniWRT package into SDK
        shell: bash
        run: |
          set -euo pipefail
          LOG_FILE="${GITHUB_WORKSPACE}/build-logs/package-copy-${{ matrix.artifact_suffix }}.log"

          {
            echo "UniWRT package copy log"
            echo "Label: ${{ matrix.label }}"

            PKG_DIR="${SDK_DIR}/package/custom/${PACKAGE_NAME}"
            rm -rf "${PKG_DIR}"
            mkdir -p "${PKG_DIR}"

            rsync -a --delete \
              --exclude ".git" \
              --exclude ".github" \
              --exclude "*.zip" \
              --exclude "artifacts" \
              --exclude "package-artifacts" \
              --exclude "build-logs" \
              --exclude "dist" \
              --exclude ".sdk-*" \
              theme/ "${PKG_DIR}/"

            echo "Package Makefile check:"
            grep -nE 'PKG_NAME|PKG_VERSION|PKG_RELEASE|package.mk|luci.mk|Package/luci-theme|BuildPackage' "${PKG_DIR}/Makefile" || true

            if grep -q 'luci.mk' "${PKG_DIR}/Makefile"; then
              echo "ERROR: Do not use luci.mk for this static theme package. Use package.mk only."
              exit 1
            fi

            if grep -RInE 'C[l]eanX|c[l]eanx|luci-theme-c[l]eanx' "${PKG_DIR}" 2>/dev/null; then
              echo "ERROR: Old legacy naming still exists. This package must be UniWRT / luci-theme-uniwrt only."
              exit 1
            fi

            test -f "${PKG_DIR}/htdocs/luci-static/uniwrt/cascade.css"
            test -f "${PKG_DIR}/htdocs/luci-static/uniwrt/uniwrt.js"
            test -f "${PKG_DIR}/ucode/template/themes/uniwrt/header.ut"
            test -x "${PKG_DIR}/root/etc/uci-defaults/30_luci-theme-uniwrt"
          } 2>&1 | tee "${LOG_FILE}"

      - name: Build UniWRT package
        shell: bash
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -euo pipefail
          LOG_FILE="${GITHUB_WORKSPACE}/build-logs/build-${{ matrix.artifact_suffix }}.log"

          {
            echo "UniWRT package build log"
            echo "Label: ${{ matrix.label }}"
            echo "Target: ${TARGET}/${SUBTARGET}"
            echo "Format: ${{ matrix.format }}"
            echo "Commit: ${GITHUB_SHA}"
            echo "Started: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

            # Static theme package: do not update/install LuCI feeds here.
            # Installing luci-base in the SDK pulls ucode/rpcd/libnl/lua build deps and caused your APK/IPK failures.
            sed -i "/^CONFIG_PACKAGE_${PACKAGE_NAME}=/d" .config 2>/dev/null || true
            echo "CONFIG_PACKAGE_${PACKAGE_NAME}=m" >> .config
            make defconfig

            make "package/custom/${PACKAGE_NAME}/clean" V=s || true
            make "package/custom/${PACKAGE_NAME}/compile" V=s -j1

            echo "Finished: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          } 2>&1 | tee "${LOG_FILE}"

      - name: Collect package artifact
        shell: bash
        run: |
          set -euo pipefail
          LOG_FILE="${GITHUB_WORKSPACE}/build-logs/artifacts-${{ matrix.artifact_suffix }}.log"

          {
            echo "UniWRT artifact collection log"
            echo "Label: ${{ matrix.label }}"

            mapfile -d '' packages < <(find "${SDK_DIR}/bin" -type f \
              \( \
                -name "${PACKAGE_NAME}_*.ipk" \
                -o -name "${PACKAGE_NAME}-*.apk" \
                -o -name "${PACKAGE_NAME}_*.apk" \
              \) -print0)

            if [ "${#packages[@]}" -eq 0 ]; then
              echo "ERROR: No package artifact found under ${SDK_DIR}/bin"
              find "${SDK_DIR}/bin" -type f | sort | tail -100 || true
              exit 1
            fi

            selected=""
            for pkg in "${packages[@]}"; do
              case "${pkg}" in
                *.${{ matrix.format }}) selected="${pkg}"; break ;;
              esac
            done

            if [ -z "${selected}" ]; then
              echo "ERROR: No ${{ matrix.format }} package was produced. Found:"
              printf '%s\n' "${packages[@]}"
              exit 1
            fi

            cp -v "${selected}" "${GITHUB_WORKSPACE}/package-artifacts/${PACKAGE_NAME}.${{ matrix.format }}"
            cp -v "${selected}" "${GITHUB_WORKSPACE}/package-artifacts/${PACKAGE_NAME}-${{ matrix.artifact_suffix }}.${{ matrix.format }}"

            echo "Collected package artifacts:"
            ls -lah "${GITHUB_WORKSPACE}/package-artifacts"
          } 2>&1 | tee "${LOG_FILE}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: uniwrt-package-${{ matrix.artifact_suffix }}
          path: package-artifacts/*
          if-no-files-found: error
          retention-days: 14

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uniwrt-logs-${{ matrix.artifact_suffix }}
          path: build-logs/*
          if-no-files-found: warn
          retention-days: 14

  prerelease:
    name: Publish GitHub pre-release
    runs-on: ubuntu-24.04
    needs: build
    if: ${{ success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch') }}

    steps:
      - name: Checkout UniWRT source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: uniwrt-package-*
          merge-multiple: true

      - name: Generate release notes and checksums
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(tr -d '[:space:]' < VERSION)"
          VERSION="${VERSION#v}"
          mkdir -p release-upload

          IPK_SRC="$(find release-assets -maxdepth 1 -type f -name '${PACKAGE_NAME}.ipk' | head -n 1 || true)"
          APK_SRC="$(find release-assets -maxdepth 1 -type f -name '${PACKAGE_NAME}.apk' | head -n 1 || true)"

          if [ -z "${IPK_SRC}" ]; then
            echo "ERROR: luci-theme-uniwrt.ipk missing from artifacts"
            find release-assets -maxdepth 2 -type f -print || true
            exit 1
          fi

          if [ -z "${APK_SRC}" ]; then
            echo "ERROR: luci-theme-uniwrt.apk missing from artifacts"
            find release-assets -maxdepth 2 -type f -print || true
            exit 1
          fi

          cp -f "${IPK_SRC}" release-upload/${PACKAGE_NAME}.ipk
          cp -f "${APK_SRC}" release-upload/${PACKAGE_NAME}.apk

          (
            cd release-upload
            sha256sum ${PACKAGE_NAME}.ipk ${PACKAGE_NAME}.apk > SHA256SUMS.txt
          )

          cat > RELEASE_NOTES.md <<EOF_NOTES
          # UniWRT v${VERSION} rolling pre-release

          Automated UniWRT LuCI theme package build.

          ## Assets

          - \`${PACKAGE_NAME}.apk\` for OpenWrt 25.12.4 / APK-based builds.
          - \`${PACKAGE_NAME}.ipk\` for OpenWrt 24.10.6 / OPKG-based builds.
          - \`SHA256SUMS.txt\` for checksums.

          ## Install on OpenWrt 25.12.4

          \`\`\`sh
          cd /tmp
          apk del ${PACKAGE_NAME} 2>/dev/null || true
          sed -i '/^${PACKAGE_NAME}/d' /etc/apk/world 2>/dev/null || true
          wget https://github.com/${GITHUB_REPOSITORY}/releases/download/pre-release/${PACKAGE_NAME}.apk
          apk add --allow-untrusted ./${PACKAGE_NAME}.apk
          uci set luci.main.mediaurlbase='/luci-static/uniwrt'
          uci commit luci
          rm -rf /tmp/luci-indexcache /tmp/luci-modulecache
          /etc/init.d/uhttpd restart
          \`\`\`

          ## Install on OpenWrt 24.10.6

          \`\`\`sh
          cd /tmp
          wget https://github.com/${GITHUB_REPOSITORY}/releases/download/pre-release/${PACKAGE_NAME}.ipk
          opkg install ./${PACKAGE_NAME}.ipk
          uci set luci.main.mediaurlbase='/luci-static/uniwrt'
          uci commit luci
          rm -rf /tmp/luci-indexcache /tmp/luci-modulecache
          /etc/init.d/uhttpd restart
          \`\`\`
          EOF_NOTES

          cp RELEASE_NOTES.md release-upload/RELEASE_NOTES.txt
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Replace moving pre-release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.release_meta.outputs.version }}
        run: |
          set -euo pipefail

          # No custom PAT/secret required. This uses GitHub's built-in workflow token.
          # Required repo setting: Settings > Actions > General > Workflow permissions > Read and write permissions.
          gh release delete pre-release --yes --cleanup-tag 2>/dev/null || true
          git push origin :refs/tags/pre-release 2>/dev/null || true

          mapfile -t assets < <(find release-upload -maxdepth 1 -type f | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "ERROR: No release asset files were prepared."
            exit 1
          fi

          gh release create pre-release "${assets[@]}" \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "UniWRT v${VERSION} rolling pre-release #${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}" \
            --notes-file RELEASE_NOTES.md \
            --prerelease
