name: Build OpenWrt packages

env:
  PACKAGE_NAME: luci-theme-uniwrt

on:
  workflow_dispatch:
    inputs:
      openwrt_24_release:
        description: OpenWrt 24.x release for IPK build
        required: true
        default: 24.10.2
      openwrt_25_release:
        description: OpenWrt 25.x release for APK build
        required: true
        default: 25.12.1
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

concurrency:
  group: uniwrt-packages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: OpenWrt 24.x IPK
            release_input: openwrt_24_release
            default_release: 24.10.2
            target: x86/64
            expected_ext: ipk
          - name: OpenWrt 25.x APK
            release_input: openwrt_25_release
            default_release: 25.12.1
            target: x86/64
            expected_ext: apk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib gettext git \
            libncurses-dev libssl-dev python3 python3-setuptools rsync unzip \
            zlib1g-dev file wget curl zstd ca-certificates

      - name: Resolve OpenWrt release
        id: release
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${{ matrix.release_input }}" in
              openwrt_24_release) value="${{ inputs.openwrt_24_release }}" ;;
              openwrt_25_release) value="${{ inputs.openwrt_25_release }}" ;;
              *) value="${{ matrix.default_release }}" ;;
            esac
          else
            value="${{ matrix.default_release }}"
          fi
          echo "value=$value" >> "$GITHUB_OUTPUT"
          echo "Using OpenWrt release: $value"

      - name: Build package with OpenWrt SDK
        run: |
          set -euo pipefail
          ./scripts/build-with-sdk.sh "${{ steps.release.outputs.value }}" "${{ matrix.target }}"

      - name: Verify package output
        run: |
          set -euo pipefail
          find dist -maxdepth 3 -type f -print
          test -n "$(find dist -type f -name '${{ env.PACKAGE_NAME }}*.${{ matrix.expected_ext }}' -print -quit)"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-${{ matrix.expected_ext }}-${{ steps.release.outputs.value }}
          path: |
            dist/**/*.ipk
            dist/**/*.apk
            dist/**/SHA256SUMS
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download built packages
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Show release assets
        run: |
          set -euo pipefail
          find release-assets -type f -print

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.ipk
            release-assets/**/*.apk
            release-assets/**/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
