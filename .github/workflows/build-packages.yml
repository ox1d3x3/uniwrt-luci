name: Build CleanX OpenWrt packages

env:
  PACKAGE_NAME: luci-theme-cleanx
  PACKAGE_VERSION: 0.2.3

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "Makefile"
      - "VERSION"
      - "CHANGELOG.md"
      - "htdocs/**"
      - "ucode/**"
      - "root/**"
      - "scripts/**"
      - ".github/workflows/build-packages.yml"

concurrency:
  group: cleanx-packages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: OpenWrt 24.10.6 IPK
            format: ipk
            sdk_url: https://downloads.openwrt.org/releases/24.10.6/targets/mediatek/mt7622/openwrt-sdk-24.10.6-mediatek-mt7622_gcc-13.3.0_musl.Linux-x86_64.tar.zst

          - label: OpenWrt 25.12.4 APK
            format: apk
            sdk_url: https://downloads.openwrt.org/releases/25.12.4/targets/mediatek/mt7622/openwrt-sdk-25.12.4-mediatek-mt7622_gcc-14.3.0_musl.Linux-x86_64.tar.zst

    steps:
      - name: Checkout CleanX source
        uses: actions/checkout@v4
        with:
          path: theme

      - name: Install host dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            curl \
            file \
            gawk \
            git \
            gettext \
            libncurses-dev \
            python3 \
            rsync \
            tar \
            unzip \
            wget \
            zstd

      - name: Download OpenWrt SDK
        run: |
          set -euo pipefail

          curl -fL --retry 5 --retry-delay 5 "${{ matrix.sdk_url }}" -o sdk.tar.zst
          tar --zstd -xf sdk.tar.zst

          SDK_DIR="$(find "$PWD" -maxdepth 1 -type d -name 'openwrt-sdk-*' | head -n 1)"
          if [ -z "$SDK_DIR" ]; then
            echo "ERROR: SDK directory not found after extraction"
            exit 1
          fi

          echo "SDK_DIR=$SDK_DIR" >> "$GITHUB_ENV"
          echo "Using SDK: $SDK_DIR"

      - name: Copy CleanX package into SDK
        run: |
          set -euo pipefail

          rm -rf "$SDK_DIR/package/custom/$PACKAGE_NAME"
          mkdir -p "$SDK_DIR/package/custom/$PACKAGE_NAME"

          rsync -a --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "*.zip" \
            --exclude "package-artifacts" \
            --exclude "build-logs" \
            --exclude "sdk.tar.zst" \
            --exclude "openwrt-sdk-*" \
            theme/ "$SDK_DIR/package/custom/$PACKAGE_NAME/"

          test -f "$SDK_DIR/package/custom/$PACKAGE_NAME/Makefile"

      - name: Validate package metadata
        run: |
          set -euo pipefail

          MF="$SDK_DIR/package/custom/$PACKAGE_NAME/Makefile"

          grep -q '^PKG_NAME:=luci-theme-cleanx$' "$MF"
          grep -q '^PKG_VERSION:=0.2.3$' "$MF"
          grep -q '^PKGARCH:=all$' "$MF"

          if grep -Eq '^[[:space:]]*DEPENDS[[:space:]]*:=' "$MF"; then
            echo "ERROR: CleanX is a static LuCI theme package and must not define DEPENDS."
            echo "Adding DEPENDS pulls LuCI runtime packages into the SDK and causes lua/ucode/netlink header failures."
            grep -n 'DEPENDS' "$MF" || true
            exit 1
          fi

          if grep -Eq 'luci\.mk|LUCI_DEPENDS|LUCI_TITLE' "$MF"; then
            echo "ERROR: Do not use luci.mk for this static theme package. Use package.mk only."
            exit 1
          fi

      - name: Build CleanX package only
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -euo pipefail

          make defconfig

          # Important:
          # The package is copied under package/custom/luci-theme-cleanx,
          # so the correct target is package/custom/luci-theme-cleanx/compile.
          # Do not use package/feeds/luci/... and do not run feeds install -a.
          make "package/custom/${PACKAGE_NAME}/clean" V=s || true
          make "package/custom/${PACKAGE_NAME}/compile" V=s -j1

      - name: Collect package
        run: |
          set -euo pipefail

          mkdir -p package-artifacts build-logs

          find "$SDK_DIR/bin" -type f \
            \( -name "${PACKAGE_NAME}_*.ipk" -o -name "${PACKAGE_NAME}-*.apk" -o -name "${PACKAGE_NAME}_*.apk" \) \
            -print -exec cp -v {} package-artifacts/ \;

          echo "Collected files:"
          find package-artifacts -type f -maxdepth 1 -print | sort

          if [ "${{ matrix.format }}" = "ipk" ]; then
            test "$(find package-artifacts -type f -name '*.ipk' | wc -l)" -gt 0
          fi

          if [ "${{ matrix.format }}" = "apk" ]; then
            test "$(find package-artifacts -type f -name '*.apk' | wc -l)" -gt 0
          fi

      - name: Upload ${{ matrix.format }} package
        uses: actions/upload-artifact@v4
        with:
          name: cleanx-v${{ env.PACKAGE_VERSION }}-${{ matrix.format }}-${{ github.run_number }}
          path: package-artifacts/*.${{ matrix.format }}
          if-no-files-found: error
