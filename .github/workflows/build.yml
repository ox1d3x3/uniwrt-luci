name: Build UniWRT (IPK + APK)

# Builds luci-theme-uniwrt with the official OpenWrt SDK across a version
# matrix. The SDK branch decides the package format:
#   23.05 / 24.10  ->  opkg   ->  .ipk
#   SNAPSHOT (25.x) ->  apk    ->  .apk
# A theme is arch-independent (LUCI_PKGARCH:=all), so one representative
# architecture per branch is enough to produce the universal package.

on:
  push:
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # needed by the release job to attach assets

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: '23.05 (ipk)'
            arch:  'x86_64-23.05.5'
          - label: '24.10 (ipk)'
            arch:  'x86_64-24.10.0'
          - label: 'snapshot 25.x (apk)'
            arch:  'x86_64-SNAPSHOT'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build package
        uses: openwrt/gh-action-sdk@v6
        env:
          ARCH: ${{ matrix.arch }}
          FEEDNAME: uniwrt_ci
          PACKAGES: luci-theme-uniwrt
          # Sign feeds only if the secrets are configured (optional):
          # KEY_BUILD:   ${{ secrets.USIGN_SEC_KEY }}   # signs the opkg feed (usign / Ed25519)
          # PRIVATE_KEY: ${{ secrets.APK_SEC_KEY }}     # signs the apk feed  (EC prime256v1 PEM)
          # INDEX: '1'                                  # also emit a package index

      - name: Collect artifacts
        run: |
          mkdir -p out
          find bin/ \( -name '*.ipk' -o -name '*.apk' \) -exec cp -v {} out/ \; || true
          echo "----- collected -----"
          ls -l out/ || true
          test -n "$(ls -A out/ 2>/dev/null)" || { echo "No packages were produced"; exit 1; }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: uniwrt-${{ matrix.arch }}
          path: out/*
          if-no-files-found: error

  release:
    name: Attach to GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List
        run: ls -lR dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
