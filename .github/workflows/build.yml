name: Build & Pre-release

# Builds UniWRT as TWO universal, architecture-independent packages and
# publishes them as a rolling pre-release:
#
#   * one .ipk  (built on the 24.10 SDK) -> install on OpenWrt 24.10.x
#   * one .apk  (built on the 25.12 SDK) -> install on OpenWrt 25.12+
#
# The theme has no compiled code (LUCI_PKGARCH:=all), so the package is
# architecture-independent. Router CPU is irrelevant; only the OpenWrt
# package-manager family matters.

on:
  push:
    branches: [ main, master ]
    paths:
      - 'luci-theme-uniwrt/**'
      - '.github/workflows/build.yml'
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # OpenWrt 24.10.x still uses opkg/ipk.
          - release: "24.10.7"
            pm: ipk
            label: "universal .ipk (OpenWrt 24.10.x)"
          # apk for the 25.12+ line.
          - release: "25.12.4"
            pm: apk
            label: "universal .apk (OpenWrt 25.12+)"
          # NOTE: keep these pinned to current point releases:
          # https://hub.docker.com/r/openwrt/sdk/tags
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build with OpenWrt SDK
        uses: openwrt/gh-action-sdk@main
        env:
          # arch is irrelevant for an "all" package — x86_64 is just the
          # fastest always-published SDK. The release suffix selects the
          # OpenWrt version, and therefore the package format.
          ARCH: x86_64-${{ matrix.release }}
          FEEDNAME: uniwrt
          PACKAGES: luci-theme-uniwrt
          V: s

      - name: Collect package
        run: |
          mkdir -p dist
          # Match ONLY our package — the SDK also builds its dependency tree
          # (luci-base, bootstrap, libc, i18n, ...) into bin/, and we must not
          # ship those. This yields exactly one file per job.
          find "$GITHUB_WORKSPACE/bin" -type f -name "luci-theme-uniwrt*.${{ matrix.pm }}" \
            -exec cp -v {} dist/ \;
          echo "----"; ls -la dist
          test -n "$(ls -A dist)" || { echo "::error::no luci-theme-uniwrt ${{ matrix.pm }} built"; exit 1; }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-theme-uniwrt-${{ matrix.pm }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish pre-release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Flatten
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.ipk' -o -name '*.apk' \) -exec cp -v {} release/ \;
          ls -la release

      - name: Decide tag
        id: tag
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "title=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "name=nightly" >> "$GITHUB_OUTPUT"
            echo "title=Nightly build (#${GITHUB_RUN_NUMBER})" >> "$GITHUB_OUTPUT"
          fi

      - name: Wipe previous nightly release (clear stale assets)
        if: github.ref_type != 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          # The rolling "nightly" release is rebuilt from scratch each run so
          # old assets never pile up. (Tagged v* releases are left untouched.)
          gh release delete nightly --yes --cleanup-tag || true

      - name: Publish / refresh pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.title }}
          prerelease: true
          make_latest: false
          fail_on_unmatched_files: true
          files: release/*
          body: |
            Automated pre-release built from `${{ github.sha }}`.

            Two universal, architecture-independent packages — pick by your
            OpenWrt **version**, not your router model:

            | Your OpenWrt | File |
            |-------------:|:-----|
            | 24.10.x | `luci-theme-uniwrt_*_all.ipk` |
            | 25.12.x+ | `luci-theme-uniwrt-*.apk` |

            ```sh
            # 24.10
            opkg install ./luci-theme-uniwrt_*_all.ipk
            # 25.12+
            apk add --allow-untrusted ./luci-theme-uniwrt-*.apk
            ```
            Then hard-refresh LuCI (Ctrl+Shift+R).
